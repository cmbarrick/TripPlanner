name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Restore backend
        run: dotnet restore backend/Wander.sln

      - name: Build backend
        run: dotnet build backend/Wander.sln --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test backend/Wander.sln --configuration Release --no-build

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Lint app
        run: npm run lint
        working-directory: app

      - name: Typecheck app
        run: npm run typecheck
        working-directory: app

      - name: Run app tests
        run: npm run test
        working-directory: app

      - name: Install EF CLI
        run: dotnet tool install --global dotnet-ef --version 9.0.16

      - name: Verify EF migrations compile
        env:
          PATH: ${{ env.PATH }}:/home/runner/.dotnet/tools
        run: >
          dotnet ef migrations script
          --project backend/Wander.Api/Wander.Api.csproj
          --startup-project backend/Wander.Api/Wander.Api.csproj
          --idempotent
          --no-build

  infra-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Build Bicep template
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Validate environment parameter files
        run: |
          for env in dev staging prod; do
            echo "Validating infra/env/$env.bicepparam"
            az bicep build-params --file "infra/env/$env.bicepparam" --stdout > /dev/null
          done

  # Deploys the dev environment on every push to main: provisions/updates infra (Bicep),
  # applies EF migrations, deploys the API, and smoke-tests /health. Requires GitHub→Azure
  # OIDC + the secrets listed in infra/README.md. Skipped on PRs and forks.
  deploy-dev:
    needs: [validate, infra-validate]
    # Only runs once you opt in by setting repo variable DEPLOY_DEV=true (after the
    # one-time OIDC + secrets setup in infra/README.md). Until then, pushes stay green.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_DEV == 'true'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_LOCATION: eastus2
    outputs:
      api_host: ${{ steps.infra.outputs.api_host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure (Bicep)
        id: infra
        env:
          WANDER_PG_ADMIN_PASSWORD: ${{ secrets.WANDER_PG_ADMIN_PASSWORD }}
        run: |
          outputs=$(az deployment sub create \
            --location "$AZURE_LOCATION" \
            --name "wander-dev-${{ github.run_number }}" \
            --template-file infra/main.bicep \
            --parameters infra/env/dev.bicepparam \
            --query properties.outputs -o json)
          API_HOST=$(echo "$outputs" | jq -r .apiHostName.value)
          echo "RG_NAME=$(echo "$outputs" | jq -r .resourceGroupName.value)" >> "$GITHUB_ENV"
          echo "APP_NAME=$(echo "$outputs" | jq -r .apiName.value)" >> "$GITHUB_ENV"
          echo "API_HOST=$API_HOST" >> "$GITHUB_ENV"
          echo "PG_FQDN=$(echo "$outputs" | jq -r .postgresFqdn.value)" >> "$GITHUB_ENV"
          echo "PG_LOGIN=$(echo "$outputs" | jq -r .postgresAdminLogin.value)" >> "$GITHUB_ENV"
          echo "api_host=$API_HOST" >> "$GITHUB_OUTPUT"

      - name: Install EF CLI
        run: dotnet tool install --global dotnet-ef --version 9.0.16

      - name: Open Postgres firewall for runner
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "PG_SERVER=${PG_FQDN%%.*}" >> "$GITHUB_ENV"
          echo "FW_RULE=gh-${{ github.run_id }}" >> "$GITHUB_ENV"
          az postgres flexible-server firewall-rule create \
            --resource-group "$RG_NAME" \
            --name "${PG_FQDN%%.*}" \
            --rule-name "gh-${{ github.run_id }}" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

      - name: Apply database migrations
        env:
          PATH: ${{ env.PATH }}:/home/runner/.dotnet/tools
          PG_PASSWORD: ${{ secrets.WANDER_PG_ADMIN_PASSWORD }}
        run: |
          CONN="Host=$PG_FQDN;Port=5432;Database=wander;Username=$PG_LOGIN;Password=$PG_PASSWORD;SSL Mode=Require;Trust Server Certificate=true"
          dotnet ef database update \
            --project backend/Wander.Api/Wander.Api.csproj \
            --startup-project backend/Wander.Api/Wander.Api.csproj \
            --connection "$CONN"

      - name: Close Postgres firewall for runner
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "$RG_NAME" \
            --name "$PG_SERVER" \
            --rule-name "$FW_RULE" \
            --yes || true

      - name: Publish API
        run: dotnet publish backend/Wander.Api/Wander.Api.csproj -c Release -o ./publish

      - name: Package API
        run: cd publish && zip -r ../api.zip . && cd ..

      - name: Deploy API to App Service
        run: |
          az webapp deploy \
            --resource-group "$RG_NAME" \
            --name "$APP_NAME" \
            --src-path api.zip \
            --type zip

      - name: Smoke test /health
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://$API_HOST/health" || true)
            if [ "$code" = "200" ]; then echo "API healthy"; exit 0; fi
            echo "attempt $i: HTTP $code — waiting..."; sleep 15
          done
          echo "Health check failed after retries"; exit 1

  # Exports the Expo web build (pointed at the freshly-deployed dev API) and uploads it to
  # Azure Static Web Apps. Reuses the SWA deployment-token pattern. Requires the secret
  # AZURE_SWA_TOKEN_DEV (the dev Static Web App's deployment token) — see infra/README.md.
  deploy-web:
    needs: [deploy-dev]
    # Requires DEPLOY_DEV=true (provides the API host) AND DEPLOY_WEB=true. Enable DEPLOY_WEB
    # after the first infra deploy creates the Static Web App and you've added its token.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_WEB == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm ci
        working-directory: app

      - name: Export Expo web build
        working-directory: app
        env:
          EXPO_PUBLIC_API_URL: https://${{ needs.deploy-dev.outputs.api_host }}
        run: npx expo export --platform web --output-dir dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: app/dist
          skip_app_build: true
          output_location: ''
